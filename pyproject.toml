[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "dslop>=0.2.2",
    "fonttools>=4.63.0",
    "mdformat>=1.0.0",
    "mdformat-gfm>=1.0.0",
    "mdformat-pyproject>=0.1.1",
    "pytest>=9.0.2",
    "ruff>=0.15.19",
    "ty>=0.0.53",
    "vulture>=2.16",
]

[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["experiments", "runs"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "D",
    "EM101",
    "ISC001",
    "PLR0913",
    "TC002",
    "TC003",
    "TRY003",
]

[tool.ruff.lint.per-file-ignores]
"packages/pipeline/src/pdf_pipeline/ocr/cli.py" = ["T201"]
"packages/pipeline/src/pdf_pipeline/ocr/reconcile.py" = ["T201"]
"packages/*/tests/**/*.py" = ["PLR2004", "S101"]

[tool.mdformat]
wrap = "no"
number = false
end_of_line = "lf"
extensions = ["gfm"]

[tool.ty]
environment.python-version = "3.12"

[tool.ty.src]
exclude = ["experiments", "runs"]

[tool.vulture]
paths = ["packages/pipeline/src", "packages/edit-pdf/src"]
min_confidence = 80

[tool.pytest.ini_options]
testpaths = ["packages/pipeline/tests"]
